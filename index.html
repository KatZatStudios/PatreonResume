<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bad Date Slider</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; padding: 32px; }
    .row { display: flex; align-items: center; gap: 16px; }
    input[type="range"] { width: min(900px, 90vw); }
    .tiny { font-size: 12px; opacity: 0.7; }
    .big { font-size: 28px; font-weight: 700; margin-top: 16px; }
  </style>
</head>
<body>
  <h1>Pick a Date</h1>

  <div class="row">
    <span class="tiny">Jan 01, 0000</span>
    <input id="s" type="range" min="0" max="3652059" value="0" />
    <span class="tiny">Dec 31, 9999</span>
  </div>

  <div id="out" class="big">Jan 01, 0000</div>
  <div class="tiny">days since Jan 01, 0000: <span id="n">0</span></div>

  <script>
    const s = document.getElementById("s");
    const out = document.getElementById("out");
    const n = document.getElementById("n");

    function isLeap(y) {
      return (y % 4 === 0 && y % 100 !== 0) || (y % 400 === 0);
    }

    function daysToDate(totalDays) {
      let y = 0;
      let d = totalDays;

      while (true) {
        const diy = isLeap(y) ? 366 : 365;
        if (d < diy) break;
        d -= diy;
        y++;
      }

      const ml = [31, isLeap(y) ? 29 : 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
      let m = 0;
      while (d >= ml[m]) { d -= ml[m]; m++; }

      const day = d + 1;
      const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      return `${months[m]} ${String(day).padStart(2,"0")}, ${String(y).padStart(4,"0")}`;
    }

    function render() {
      const v = Number(s.value);
      out.textContent = daysToDate(v);
      n.textContent = String(v);
    }

    s.addEventListener("input", render);
    render();
  </script>
</body>
</html>
